[pytest]
testpaths = tests
addopts = -v --tb=short --no-header
markers =
    smoke: Quick connectivity and health checks
    readonly: Tests that only read data (safe to run anytime)
    crud: Tests that create, modify, and delete data
    slow: Tests that may take longer (profiling, jobs)
    destructive: Tests that affect external resources (skip by default)
    lifecycle: Tests for status transitions, approval flows, clone/commit/discard workflows
