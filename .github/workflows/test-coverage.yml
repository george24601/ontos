name: Test Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get JFrog OIDC token
        run: |
          set -euo pipefail
          ID_TOKEN=$(curl -sLS \
            -H "User-Agent: actions/oidc-client" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
          echo "::add-mask::${ID_TOKEN}"
          ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
            "https://databricks.jfrog.io/access/api/v1/oidc/token" \
            -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
          echo "::add-mask::${ACCESS_TOKEN}"
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "FAIL: Could not extract JFrog access token"
            exit 1
          fi
          echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          echo "JFrog OIDC token obtained successfully"

      - name: Configure pip
        run: |
          set -euo pipefail
          echo "PIP_INDEX_URL=https://gha-service-account:${JFROG_ACCESS_TOKEN}@databricks.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> "$GITHUB_ENV"
          echo "pip configured to use JFrog registry"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./src
        run: |
          python -m pip install --upgrade pip
          pip install "virtualenv<21" hatch==1.16.3
          hatch -e dev run pip install --require-hashes -r backend/requirements.txt

      - name: Run tests with coverage
        working-directory: ./src
        env:
          DATABRICKS_HOST: https://test.databricks.com
          DATABRICKS_WAREHOUSE_ID: test_warehouse_id
          DATABRICKS_CATALOG: test_catalog
          DATABRICKS_SCHEMA: test_schema
          DATABRICKS_VOLUME: test_volume
          APP_AUDIT_LOG_DIR: /tmp/audit_logs
        run: |
          hatch -e dev run pytest \
            --cov=backend/src \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./src/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: backend-coverage-html
          path: ./src/backend/htmlcov/

      # Coverage threshold check disabled for now
      # - name: Check coverage threshold
      #   working-directory: ./src
      #   run: |
      #     hatch -e dev run pytest --cov=backend/src --cov-fail-under=80

  frontend-tests:
    name: Frontend Tests
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get JFrog OIDC token
        run: |
          set -euo pipefail
          ID_TOKEN=$(curl -sLS \
            -H "User-Agent: actions/oidc-client" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
          echo "::add-mask::${ID_TOKEN}"
          ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
            "https://databricks.jfrog.io/access/api/v1/oidc/token" \
            -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
          echo "::add-mask::${ACCESS_TOKEN}"
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "FAIL: Could not extract JFrog access token"
            exit 1
          fi
          echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          echo "JFrog OIDC token obtained successfully"

      - name: Configure npm
        run: |
          set -euo pipefail
          cat > ~/.npmrc << EOF
          registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/
          //databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${JFROG_ACCESS_TOKEN}
          always-auth=true
          EOF
          echo "npm configured to use JFrog registry"
          # yarn 1 with --frozen-lockfile honors `resolved` URLs in yarn.lock,
          # bypassing the configured registry. Rewrite them to JFrog so CI
          # (which has no egress to registry.yarnpkg.com) can fetch tarballs.
          sed -i 's|https://registry.yarnpkg.com/|https://databricks.jfrog.io/artifactory/api/npm/db-npm/|g' src/frontend/yarn.lock
          echo "yarn.lock registry URLs rewritten for JFrog"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: './src/frontend/yarn.lock'

      - name: Install dependencies
        working-directory: ./src/frontend
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: ./src/frontend
        run: yarn test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./src/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: frontend-coverage-html
          path: ./src/frontend/coverage/

      - name: Check coverage threshold
        working-directory: ./src/frontend
        run: |
          # vitest already fails if thresholds not met (configured in vitest.config.ts)
          echo "Coverage thresholds checked by vitest"

  e2e-tests:
    name: E2E Tests
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 20
    # Run E2E tests only on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ontos_test
          POSTGRES_PASSWORD: ontos_test_pw
          POSTGRES_DB: app_ontos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get JFrog OIDC token
        run: |
          set -euo pipefail
          ID_TOKEN=$(curl -sLS \
            -H "User-Agent: actions/oidc-client" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
          echo "::add-mask::${ID_TOKEN}"
          ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
            "https://databricks.jfrog.io/access/api/v1/oidc/token" \
            -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
          echo "::add-mask::${ACCESS_TOKEN}"
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "FAIL: Could not extract JFrog access token"
            exit 1
          fi
          echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          echo "JFrog OIDC token obtained successfully"

      - name: Configure pip
        run: |
          set -euo pipefail
          echo "PIP_INDEX_URL=https://gha-service-account:${JFROG_ACCESS_TOKEN}@databricks.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> "$GITHUB_ENV"
          echo "pip configured to use JFrog registry"

      - name: Configure npm
        run: |
          set -euo pipefail
          cat > ~/.npmrc << EOF
          registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/
          //databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${JFROG_ACCESS_TOKEN}
          always-auth=true
          EOF
          echo "npm configured to use JFrog registry"
          # yarn 1 with --frozen-lockfile honors `resolved` URLs in yarn.lock,
          # bypassing the configured registry. Rewrite them to JFrog so CI
          # (which has no egress to registry.yarnpkg.com) can fetch tarballs.
          sed -i 's|https://registry.yarnpkg.com/|https://databricks.jfrog.io/artifactory/api/npm/db-npm/|g' src/frontend/yarn.lock
          echo "yarn.lock registry URLs rewritten for JFrog"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: './src/frontend/yarn.lock'

      - name: Install backend dependencies
        working-directory: ./src
        run: |
          python -m pip install --upgrade pip
          pip install "virtualenv<21" hatch==1.16.3
          hatch -e dev run pip install --require-hashes -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: ./src/frontend
        run: yarn install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('src/frontend/package.json') }}

      - name: Install Playwright browsers
        working-directory: ./src/frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        working-directory: ./src/frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start backend server
        working-directory: ./src
        env:
          ENV: LOCAL
          DEBUG: "true"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: ontos_test
          POSTGRES_PASSWORD: ontos_test_pw
          POSTGRES_DB: app_ontos
          DATABRICKS_HOST: https://mock.databricks.com
          DATABRICKS_WAREHOUSE_ID: mock_warehouse_id
          DATABRICKS_CATALOG: test_catalog
          DATABRICKS_SCHEMA: test_schema
          DATABRICKS_VOLUME: test_volume
          APP_AUDIT_LOG_DIR: /tmp/audit_logs
          APP_DEMO_MODE: "true"
          APP_DB_DROP_ON_START: "true"
          MOCK_WORKSPACE_CLIENT: "true"
          TESTING: "true"
        run: |
          mkdir -p /tmp/audit_logs
          hatch -e dev run uvicorn --app-dir backend src.app:app \
            --host 0.0.0.0 --port 8000 &
          # Wait for backend to be ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/time > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 2
          done
          curl -sf http://localhost:8000/api/time || (echo "Backend failed to start" && exit 1)

      - name: Run E2E tests
        working-directory: ./src/frontend
        env:
          BASE_URL: http://localhost:3000
        run: yarn test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: playwright-report
          path: ./src/frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: playwright-results
          path: ./src/frontend/test-results/
          retention-days: 7

  type-check:
    name: TypeScript Type Check
    runs-on:
      group: databrickslabs-protected-runner-group
